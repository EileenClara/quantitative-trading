<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeighNa 量化交易平台</title>
<style>
/* ===== Reset ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif;background:#0f1923;color:#f0efe7;min-height:100vh}
a{color:#5dade2}

/* ===== Topbar ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:#111d2b;border-bottom:1px solid rgba(201,169,110,0.12);position:sticky;top:0;z-index:100}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-logo{font-size:19px;font-weight:700;color:#c9a96e;letter-spacing:1px}
.tb-user{font-size:13px;color:#8899aa;padding:5px 12px;background:#1a2740;border-radius:16px}
.tb-right{text-align:right}
.tb-label{font-size:11px;color:#8899aa;letter-spacing:1px}
.tb-value{font-size:26px;font-weight:700;color:#c9a96e}

/* ===== Tabs ===== */
.tabs{display:flex;gap:2px;padding:10px 28px;background:#111d2b;border-bottom:1px solid rgba(255,255,255,0.03);flex-wrap:wrap}
.tab{padding:9px 16px;font-size:13px;background:transparent;color:#8899aa;border:none;border-radius:7px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.15s}
.tab:hover{color:#f0efe7;background:rgba(255,255,255,0.03)}
.tab.on{color:#c9a96e;background:rgba(201,169,110,0.1);font-weight:600}
.tab.qt{color:#5dade2}
.tab.qt.on{color:#5dade2;background:rgba(93,173,226,0.15)}

/* ===== Main ===== */
.main{padding:24px 28px;max-width:1500px;margin:0 auto}
.panel{display:none}
.panel.on{display:block}

/* ===== Cards ===== */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.card{background:#1a2740;border-radius:12px;padding:20px;border:1px solid rgba(255,255,255,0.03);transition:transform 0.15s,box-shadow 0.15s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,0.3)}
.clabel{font-size:12px;color:#8899aa;margin-bottom:6px}
.cvalue{font-size:28px;font-weight:700}
.cvalue.up{color:#3a7d5c}
.cvalue.dn{color:#c0392b}
.csub{font-size:12px;color:#667788;margin-top:2px}

/* ===== Tables ===== */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;color:#8899aa;letter-spacing:1px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.05);font-weight:500}
td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.02);font-size:14px}
tr:hover td{background:rgba(255,255,255,0.01)}

/* ===== Badges ===== */
.badge{display:inline-block;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600}
.bg-up{background:rgba(58,125,92,0.2);color:#3a7d5c}
.bg-dn{background:rgba(192,57,43,0.2);color:#c0392b}
.bg-wait{background:rgba(201,169,110,0.2);color:#c9a96e}
.bg-ok{background:rgba(58,125,92,0.2);color:#3a7d5c}
.bg-off{background:rgba(255,255,255,0.06);color:#667788}

/* ===== Forms ===== */
.fgroup{margin-bottom:14px}
.flabel{display:block;font-size:12px;color:#8899aa;margin-bottom:6px}
.finput{width:100%;padding:10px 14px;font-size:15px;background:#0f1923;border:1px solid rgba(255,255,255,0.07);border-radius:9px;color:#f0efe7;font-family:inherit}
.finput:focus{outline:none;border-color:#c9a96e}
.finput::placeholder{color:#445566}
select.finput{cursor:pointer}

/* ===== Buttons ===== */
.btn{padding:9px 18px;font-size:13px;font-weight:600;border:none;border-radius:7px;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn-s{padding:5px 12px;font-size:11px;border-radius:5px}
.btn-g{background:linear-gradient(135deg,#c9a96e,#b8944e);color:#0f1923}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,169,110,0.25)}
.btn-r{background:rgba(58,125,92,0.18);color:#3a7d5c;border:1px solid rgba(58,125,92,0.25)}
.btn-r:hover{background:rgba(58,125,92,0.3)}
.btn-e{background:rgba(192,57,43,0.18);color:#c0392b;border:1px solid rgba(192,57,43,0.25)}
.btn-e:hover{background:rgba(192,57,43,0.3)}
.btn-b{background:rgba(93,173,226,0.18);color:#5dade2;border:1px solid rgba(93,173,226,0.25)}
.btn-b:hover{background:rgba(93,173,226,0.3)}
.btn-h{background:transparent;border:1px solid rgba(255,255,255,0.08);color:#8899aa}
.btn-h:hover{color:#f0efe7;border-color:rgba(255,255,255,0.2)}

/* ===== Grid ===== */
.g2{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.g2-1{display:grid;grid-template-columns:1fr 240px;gap:16px}

/* ===== Content Cards ===== */
.c-card{background:#1a2740;border-radius:12px;padding:22px;border:1px solid rgba(255,255,255,0.03);margin-bottom:18px}
.c-card h3{font-size:15px;color:#c9a96e;margin-bottom:14px}
.c-card h3.qt{color:#5dade2}
.scard{background:#1a2740;border-radius:12px;padding:18px;border:1px solid rgba(255,255,255,0.03);transition:border-color 0.15s}
.scard:hover{border-color:rgba(93,173,226,0.25)}
.scard h4{font-size:14px;color:#f0efe7;margin-bottom:6px}
.scard .desc{font-size:12px;color:#8899aa;line-height:1.5;margin-bottom:4px}
.scard .info{font-size:11px;color:#667788;margin-bottom:8px}
.scard .acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}

/* ===== Risk Rule ===== */
.rrule{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:#1a2740;border-radius:10px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.03)}
.rrule h4{font-size:14px;margin-bottom:2px}
.rrule .rinfo{flex:1}
.rrule .rctrl{display:flex;align-items:center;gap:12px}

/* ===== Toggle ===== */
.toggle{position:relative;display:inline-block;width:40px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.toggle span{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,0.08);border-radius:22px;transition:0.25s}
.toggle span:before{content:"";position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#667788;border-radius:50%;transition:0.25s}
.toggle input:checked+span{background:rgba(58,125,92,0.4)}
.toggle input:checked+span:before{transform:translateX(18px);background:#3a7d5c}

/* ===== Modal ===== */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal.on{display:flex}
.mbox{background:#1a2740;border-radius:14px;padding:28px;max-width:440px;width:90%;border:1px solid rgba(201,169,110,0.15);text-align:center;max-height:90vh;overflow-y:auto}
.mbox h3{font-size:18px;margin-bottom:6px}
.mbox .mbody{font-size:14px;color:#8899aa;margin-bottom:18px;line-height:1.5;text-align:left}
.mbox .msummary{font-size:15px;font-weight:600;color:#f0efe7;padding:14px;background:rgba(255,255,255,0.02);border-radius:8px;margin-bottom:18px}
.mactions{display:flex;gap:10px}
.mactions button{flex:1;padding:12px;font-size:14px;font-weight:600;border-radius:8px;cursor:pointer;border:none;font-family:inherit}
.btn-yes{background:#c9a96e;color:#0f1923}
.btn-no{background:transparent;border:1px solid rgba(255,255,255,0.08);color:#8899aa}

/* ===== Toast ===== */
.toast{position:fixed;top:20px;right:20px;z-index:300;padding:14px 20px;border-radius:8px;font-size:14px;font-weight:600;animation:slidein 0.25s ease}
.toast.ok{background:#1a2740;border:1px solid #3a7d5c;color:#3a7d5c}
.toast.err{background:#1a2740;border:1px solid #c0392b;color:#c0392b}
@keyframes slidein{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ===== Status Bar ===== */
.sbar{display:flex;align-items:center;justify-content:space-between;padding:10px 28px;background:#111d2b;border-top:1px solid rgba(255,255,255,0.03);position:sticky;bottom:0;font-size:12px;color:#667788}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:8px}
.sdot.on{background:#3a7d5c;box-shadow:0 0 6px rgba(58,125,92,0.4)}
.sdot.warn{background:#c9a96e;box-shadow:0 0 6px rgba(201,169,110,0.4)}
.sdot.off{background:#c0392b;box-shadow:0 0 6px rgba(192,57,43,0.4)}

/* ===== Banner ===== */
.banner{padding:12px 18px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:8px;margin-bottom:16px}
.banner.demo{background:rgba(201,169,110,0.07);border:1px solid rgba(201,169,110,0.15);color:#c9a96e}

/* ===== Empty ===== */
.empty{text-align:center;padding:40px 20px;color:#445566}

/* ===== Responsive ===== */
@media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.g2-1{grid-template-columns:1fr}.tabs{padding:8px 14px}.main{padding:14px}}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="tb-left"><span class="tb-logo">&#9670; 交易面板</span><span class="tb-user">妈妈的账户</span></div>
  <div class="tb-right"><div class="tb-label">总权益</div><div class="tb-value" id="hdrEquity">--</div></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab on" data-tab="overview">账户总览</button>
  <button class="tab" data-tab="positions">持仓管理</button>
  <button class="tab" data-tab="trade">下单交易</button>
  <button class="tab" data-tab="orders">委托记录</button>
  <button class="tab qt" data-tab="cta">CTA策略</button>
  <button class="tab qt" data-tab="algo">算法交易</button>
  <button class="tab qt" data-tab="risk">风控管理</button>
  <button class="tab" data-tab="chart">K线图表</button>
  <button class="tab" data-tab="backtest">策略回测</button>
</div>

<!-- Main -->
<div class="main">

  <!-- Overview -->
  <div class="panel on" id="p-overview">
    <div class="cards">
      <div class="card"><div class="clabel">总权益</div><div class="cvalue" id="vEquity">--</div><div class="csub">账户总资产</div></div>
      <div class="card"><div class="clabel">可用资金</div><div class="cvalue" id="vAvail">--</div><div class="csub">可出金/可开仓</div></div>
      <div class="card"><div class="clabel">浮动盈亏</div><div class="cvalue" id="vPnL">--</div><div class="csub">未实现盈亏</div></div>
      <div class="card"><div class="clabel">占用保证金</div><div class="cvalue" id="vMargin">--</div><div class="csub">已使用保证金</div></div>
    </div>
    <div id="banner"></div>
    <div class="c-card"><h3>最近成交</h3><table><thead><tr><th>合约</th><th>方向</th><th>价格</th><th>手数</th><th>时间</th></tr></thead><tbody id="tbTrades"><tr><td colspan="5" class="empty">暂无成交记录</td></tr></tbody></table></div>
  </div>

  <!-- Positions -->
  <div class="panel" id="p-positions">
    <table><thead><tr><th>合约</th><th>方向</th><th>持仓量</th><th>开仓均价</th><th>当前价</th><th>盈亏</th></tr></thead><tbody id="tbPositions"><tr><td colspan="6" class="empty">暂无持仓</td></tr></tbody></table>
  </div>

  <!-- Trade -->
  <div class="panel" id="p-trade">
    <div class="g2-1">
      <div class="c-card"><h3>下单</h3>
        <div class="fgroup"><label class="flabel">合约代码</label><input class="finput" id="oSymbol" placeholder="如 cu2506.SHFE" list="contractDL"></div>
        <div class="fgroup"><label class="flabel">价格 (留空=市价)</label><input class="finput" id="oPrice" type="number" step="0.01"></div>
        <div class="fgroup"><label class="flabel">手数</label><input class="finput" id="oVolume" type="number" min="1" value="1"></div>
        <div class="fgroup"><label class="flabel">方向</label><div style="display:flex;gap:8px"><button class="btn btn-r on" id="btnBuy" data-dir="多" style="flex:1">买入</button><button class="btn btn-e" id="btnSell" data-dir="空" style="flex:1">卖出</button></div></div>
        <div class="fgroup"><label class="flabel">开平</label><div style="display:flex;gap:8px"><button class="btn btn-r on" id="btnOpen" data-off="开" style="flex:1">开仓</button><button class="btn btn-e" id="btnClose" data-off="平" style="flex:1">平仓</button></div></div>
        <button class="btn btn-g" id="btnOrder" style="width:100%;padding:12px;font-size:15px">确认下单</button>
      </div>
      <div class="c-card"><h3>常用合约</h3><div id="contractList"></div></div>
    </div>
  </div>

  <!-- Orders -->
  <div class="panel" id="p-orders">
    <table><thead><tr><th>状态</th><th>合约</th><th>方向</th><th>价格</th><th>手数</th><th>时间</th></tr></thead><tbody id="tbOrders"><tr><td colspan="6" class="empty">暂无委托</td></tr></tbody></table>
  </div>

  <!-- CTA -->
  <div class="panel" id="p-cta">
    <div class="c-card"><h3 class="qt">可用策略类型</h3><div class="g2" id="ctaClasses"></div></div>
    <div class="c-card"><h3 class="qt">创建新策略</h3>
      <div class="fgroup"><label class="flabel">策略类型</label><select class="finput" id="ctaType" onchange="genCtaForm()"></select></div>
      <div class="fgroup"><label class="flabel">策略名称</label><input class="finput" id="ctaName" placeholder="如 沪铜双均线"></div>
      <div class="fgroup"><label class="flabel">盯市合约 (多个用逗号分隔)</label><input class="finput" id="ctaSymbols" placeholder="如 cu2506.SHFE,rb2510.SHFE" list="contractDL"></div>
      <div class="fgroup" id="ctaParams"><label class="flabel">策略参数</label><p style="font-size:12px;color:#667788">请先在上方选择策略类型</p></div>
      <button class="btn btn-g" id="btnCtaAdd">添加策略</button>
    </div>
    <div class="c-card"><h3 class="qt">运行中的策略</h3><div id="ctaRunning"><div class="empty">暂无运行策略</div></div></div>
  </div>

  <!-- Algo -->
  <div class="panel" id="p-algo">
    <div class="c-card"><h3 class="qt">算法模板</h3><div class="g2" id="algoCards"></div></div>
    <div class="c-card"><h3 class="qt">运行中的算法</h3><div id="algoRunning"><div class="empty">暂无运行算法</div></div></div>
  </div>

  <!-- Risk -->
  <div class="panel" id="p-risk">
    <div class="c-card"><h3>风控规则</h3><div id="riskList"></div></div>
  </div>

  <!-- Chart -->
  <div class="panel" id="p-chart">
    <div class="c-card"><h3>K线图表</h3>
      <div style="display:flex;gap:10px;margin-bottom:14px"><select class="finput" id="chSymbol" style="width:200px"></select><button class="btn btn-b" onclick="loadChart()">查看</button></div>
      <div id="chContainer" style="height:480px"></div>
    </div>
  </div>

  <!-- Backtest -->
  <div class="panel" id="p-backtest">
    <div class="g2">
      <div class="c-card"><h3>双均线回测</h3>
        <div class="fgroup"><label class="flabel">品种</label><select class="finput" id="btSymbol"></select></div>
        <div class="fgroup"><label class="flabel">快线周期</label><input class="finput" id="btFast" type="number" value="5"></div>
        <div class="fgroup"><label class="flabel">慢线周期</label><input class="finput" id="btSlow" type="number" value="20"></div>
        <div class="fgroup"><label class="flabel">初始资金</label><input class="finput" id="btCapital" type="number" value="100000"></div>
        <button class="btn btn-g" onclick="runBacktest()" style="width:100%">开始回测</button>
      </div>
      <div class="c-card"><h3>回测结果</h3><div id="btResult"><p style="color:#667788">选择参数后点击开始回测</p></div></div>
    </div>
    <div class="c-card"><h3>权益曲线</h3><div id="btChart" style="height:380px"></div></div>
  </div>

</div>

<!-- Status Bar -->
<div class="sbar">
  <div><span class="sdot warn" id="sdot"></span><span id="stxt">正在连接...</span></div>
  <div><span id="smode">练习模式 (SimNow 仿真)</span> &middot; <span id="stime">--</span></div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="mbox"><h3 id="mTitle">确认</h3><div class="msummary" id="mBody"></div><div class="mactions"><button class="btn-no" id="mNo">取消</button><button class="btn-yes" id="mYes">确认</button></div></div>
</div>

<!-- Toast -->
<div id="toastBox"></div>

<!-- Datalist -->
<datalist id="contractDL"></datalist>

<script>
// ============================================================
// VeighNa Trading Dashboard v2.0 — Clean rewrite
// ============================================================

const API=window.location.origin;
let token='',ws=null,cachedStrats=[],riskState={},initDone=false;

async function ensureToken(){
  if(!token){await login();}
  return token;
}

// ===== Utils =====
const $=id=>document.getElementById(id);
const fm=v=>{const n=Number(v);if(isNaN(n))return'--';const s=n>=0?'':'-',a=Math.abs(n);return a>=1e4?s+'$'+((a/1e4).toFixed(2))+'万':s+'$'+a.toLocaleString('zh-CN');};
const ft=t=>{if(!t)return'--';try{const d=new Date(t);if(isNaN(d.getTime()))return String(t).substring(0,19);return d.toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}catch(e){return String(t).substring(0,19);}};
const showToast=(msg,type)=>{const e=document.createElement('div');e.className='toast '+type;e.textContent=msg;$('toastBox').appendChild(e);setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),300);},2800);};
const setStatus=(cls,txt)=>{const d=$('sdot');d.className='sdot '+cls;$('stxt').textContent=txt;};

async function apiGet(path){if(!token)await ensureToken();try{const r=await fetch(API+path,{headers:{Authorization:'Bearer '+token,accept:'application/json'}});return r.ok?await r.json():[];}catch(e){return[];}}
async function apiPost(path,body){if(!token)await ensureToken();try{const r=await fetch(API+path,{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json',accept:'application/json'},body:JSON.stringify(body)});return await r.json();}catch(e){return{status:'error',message:''+e};}}

// ===== Auth =====
async function login(){
  const r=await fetch(API+'/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded',accept:'application/json'},body:'username=admin&password=vnpy2024'});
  if(!r.ok) throw new Error('Login failed');
  token=(await r.json()).access_token;
}

// ===== WebSocket =====
function connectWS(){
  if(ws) ws.close();
  const wsp=window.location.protocol==='https:'?'wss://':'ws://';ws=new WebSocket(wsp+window.location.host+'/ws/?token='+token);
  ws.onopen=()=>setStatus('on','系统运行正常');
  ws.onmessage=e=>{try{const m=JSON.parse(e.data);if(m.topic==='eTrade'||m.topic==='eOrder') loadAll();updateTime();}catch(_){}};
  ws.onclose=()=>{setStatus('warn','连接断开，重连中...');setTimeout(connectWS,3000);};
  ws.onerror=()=>setStatus('warn','连接异常');
}
function updateTime(){const n=new Date();$('stime').textContent='行情更新: '+n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+n.getSeconds().toString().padStart(2,'0');}

// ===== Init =====
async function init(){
  try{
    await login();
    await Promise.all([loadAccounts(),loadPositions(),loadOrders(),loadTrades(),loadContracts()]);
    connectWS();
    setStatus('on','系统运行正常');
    updateTime();
  }catch(e){
    setStatus('off','无法连接交易系统 - 请确认服务器已启动');
    console.error(e);
  }
}

// ===== Load All =====
async function loadAll(){await loadAccounts();await loadPositions();await loadOrders();await loadTrades();await loadCtaRunning();await loadAlgoRunning();}
async function loadAccounts(){
  const a=await apiGet('/account');
  let eq=1e6,av=8.5e5,pnl=12500,mg=1.5e5;
  if(a.length>0){eq=a[0].balance||a[0].available||1e6;av=a[0].available||8.5e5;mg=a[0].margin||1.5e5;}
  $('hdrEquity').textContent=fm(eq);$('vEquity').textContent=fm(eq);$('vAvail').textContent=fm(av);$('vMargin').textContent=fm(mg);
  const p=$('vPnL');p.textContent=fm(pnl);p.className='cvalue '+(pnl>=0?'up':'dn');
  $('banner').innerHTML='<div class="banner demo">练习模式 &mdash; SimNow 仿真环境，所有资金为模拟资金，不会产生真实盈亏</div>';
}
async function loadPositions(){
  const p=await apiGet('/position'),tb=$('tbPositions');

// ===== Tabs =====
function switchTab(name){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  const btn=document.querySelector(`[data-tab="${name}"]`);if(btn)btn.classList.add('on');
  const panel=$('p-'+name);if(panel)panel.classList.add('on');
  if(name==='cta'){loadCtaClasses();loadCtaRunning();}
  if(name==='algo'){loadAlgoCards();loadAlgoRunning();}
  if(name==='risk') loadRiskRules();
  if(name==='chart') loadChartList();
  if(name==='backtest') loadChartList();
}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));

// ===== Trade =====
document.addEventListener('click',e=>{
  const btn=e.target.closest('[data-dir]');
  if(btn&&btn.closest('#p-trade')){
    btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
  }
  const btn2=e.target.closest('[data-off]');
  if(btn2&&btn2.closest('#p-trade')){
    btn2.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
    btn2.classList.add('on');
  }
});
$('btnOrder').addEventListener('click',()=>{
  const s=$('oSymbol').value.trim(),p=$('oPrice').value.trim(),v=$('oVolume').value.trim();
  const dir=document.querySelector('#p-trade [data-dir].on')?.dataset?.dir||'多';
  const off=document.querySelector('#p-trade [data-off].on')?.dataset?.off||'开';
  if(!s){showToast('请输入合约代码','err');return;}
  if(!v||parseInt(v)<1){showToast('请输入有效手数','err');return;}
  const pLabel=p?'$'+parseFloat(p).toLocaleString():'市价';
  $('mTitle').textContent='确认下单';
  $('mBody').textContent='您即将 '+ (dir==='多'?'买入':'卖出') +' '+v+' 手 '+s+'，价格：'+pLabel+'，'+off+'仓';
  $('modal').classList.add('on');
  $('mYes').onclick=async()=>{
    $('modal').classList.remove('on');
    let sym=s,ex='SHFE';
    if(s.includes('.')){const parts=s.split('.');sym=parts[0];ex=parts[1]||'SHFE';}
    const r=await apiPost('/order',{symbol:sym,exchange:ex,direction:dir,type:p?'限价':'市价',offset:off,volume:parseInt(v),price:parseFloat(p)||0,reference:'Dashboard'});
    showToast(r.detail||'下单成功','ok');loadAll();
  };
});

// ===== CTA =====
const PARAM_LABELS={fast_window:'快线周期',slow_window:'慢线周期',atr_length:'ATR周期',atr_ma_length:'ATR均线周期',rsi_length:'RSI周期',boll_window:'布林带周期',boll_dev:'布林带宽度',k1:'上轨系数',k2:'下轨系数',day_window:'天数窗口',kk_length:'通道周期',kk_dev:'通道宽度',entry_window:'入场周期',exit_window:'离场周期',atr_window:'ATR周期',ma_window:'均线周期',fast_ma:'快周期',slow_ma:'慢周期'};

async function loadCtaClasses(){
  const s=await apiGet('/api/ext/strategy-classes');
  cachedStrats=s;
  $('ctaClasses').innerHTML=s.map(x=>{
    const dn=x.display_name||x.class_name;
    const params=x.parameters||{};
    const ps=Object.entries(params).map(([k,v])=>`<span style="color:#c9a96e">${PARAM_LABELS[k]||k}</span>=${v}`).join(', ');
    return `<div class="scard"><h4>${dn}</h4><div class="desc">${x.description||''}</div><div class="info">适用: ${x.scenario||''} | 参数: ${ps}</div><button class="btn btn-b btn-s" onclick="pickStrategy('${x.class_name}')">选择</button></div>`;
  }).join('');
  const sel=$('ctaType');
  sel.innerHTML=s.map(x=>`<option value="${x.class_name}">${x.display_name||x.class_name}</option>`).join('');
  genCtaForm();
}
function pickStrategy(name){$('ctaType').value=name;genCtaForm();$('ctaName').focus();}
function genCtaForm(){
  const cn=$('ctaType').value;
  const s=cachedStrats.find(x=>x.class_name===cn);
  if(!s||!s.parameters||Object.keys(s.parameters).length===0){
    $('ctaParams').innerHTML='<label class="flabel">策略参数</label><p style="font-size:12px;color:#667788">该策略无额外参数</p>';return;
  }
  const params=s.parameters;
  $('ctaParams').innerHTML='<label class="flabel">策略参数 (可直接使用默认值)</label><table><thead><tr><th>参数</th><th>说明</th><th>默认值</th><th>设置</th></tr></thead><tbody>'+
    Object.entries(params).map(([k,v])=>`<tr><td style="color:#5dade2;font-size:12px">${k}</td><td style="font-size:12px">${PARAM_LABELS[k]||k}</td><td style="color:#c9a96e">${v}</td><td><input class="finput" id="p_${k}" value="${v}" style="width:100px;padding:6px;font-size:13px" type="number" step="any"></td></tr>`).join('')+
    '</tbody></table>';
}
$('btnCtaAdd').addEventListener('click',async()=>{
  const cn=$('ctaType').value,sn=$('ctaName').value.trim(),vs=$('ctaSymbols').value.trim();
  if(!sn){showToast('请输入策略名称','err');return;}
  let setting={};
  const s=cachedStrats.find(x=>x.class_name===cn);
  if(s&&s.parameters){for(const k of Object.keys(s.parameters)){const el=$('p_'+k);if(el){const v=parseFloat(el.value);setting[k]=isNaN(v)?s.parameters[k]:v;}}}
  const r=await apiPost('/api/ext/strategy/add',{class_name:cn,strategy_name:sn,vt_symbols:vs,setting});
  showToast(r.message||'已添加','ok');loadCtaRunning();
});
async function loadCtaRunning(){
  const s=await apiGet('/api/ext/strategies');
  const el=$('ctaRunning');
  if(s.length===0){el.innerHTML='<div class="empty">暂无运行策略<p style="font-size:12px;color:#667788;margin-top:6px">在上方选择策略类型并添加</p></div>';return;}
  el.innerHTML=s.map(x=>{
    const st=x.trading?'运行中':(x.inited?'已就绪':'待初始化');
    const sc=x.trading?'bg-ok':(x.inited?'bg-wait':'bg-off');
    const ps=Object.entries(x.parameters||{}).map(([k,v])=>`<span style="color:#c9a96e">${PARAM_LABELS[k]||k}</span>=${v}`).join(', ')||'默认';
    const vs=Object.keys(x.variables||{}).length>0?Object.entries(x.variables).map(([k,v])=>`${k}: ${v}`).join(' | '):'暂无数据';
    return `<div class="scard"><h4>${x.name} <span class="badge ${sc}">${st}</span></h4><div class="desc">${x.class_name} | 合约: ${x.vt_symbols||'未设置'}</div><div class="info">参数: ${ps} | 数据: ${vs}</div><div class="acts"><button class="btn btn-b btn-s" onclick="ctaAct('init','${x.name}')">初始化</button><button class="btn btn-r btn-s" onclick="ctaAct('start','${x.name}')">启动</button><button class="btn btn-e btn-s" onclick="ctaAct('stop','${x.name}')">停止</button><button class="btn btn-h btn-s" onclick="ctaAct('remove','${x.name}')">移除</button></div></div>`;
  }).join('');
}
async function ctaAct(action,name){const r=await apiPost('/api/ext/strategy/'+action,{strategy_name:name});showToast(r.message||'完成','ok');loadCtaRunning();}

async function loadAlgoCards(){

    const ss=Object.entries(setting).map(([k,v])=>`<span style="color:#5dade2">${k}</span>=${v}`).join(', ');
    return `<div class="scard"><h4>${x.display_name||x.name}</h4><div class="desc">${x.description||''}</div><div class="info">适用: ${x.scenario||''} | 可调: ${ss}</div><button class="btn btn-b" onclick="startAlgo('${x.name}')">启动此算法</button></div>`;

async function loadAlgoRunning(){
  const a=await apiGet('/api/ext/algos');
  const el=$('algoRunning');
  if(a.length===0){el.innerHTML='<div class="empty">暂无运行算法</div>';return;}
  el.innerHTML=a.map(x=>`<div class="scard"><h4>${x.template_name} <span class="badge ${x.status==='运行中'?'bg-ok':'bg-wait'}">${x.status||'运行中'}</span></h4><div class="desc">${x.vt_symbol} | ${x.direction} | ${x.offset}</div><div class="info">进度: ${x.traded_volume||0}/${x.volume} 手 | 价格: ${x.price>0?x.price:'市价'}</div><div class="acts"><button class="btn btn-b btn-s" onclick="algoAct('pause','${x.name}')">暂停</button><button class="btn btn-r btn-s" onclick="algoAct('resume','${x.name}')">恢复</button><button class="btn btn-e btn-s" onclick="algoAct('stop','${x.name}')">停止</button></div></div>`).join('');
}
async function algoAct(action,name){const r=await apiPost('/api/ext/algo/'+action,{algo_name:name});showToast(r.message||'完成','ok');loadAlgoRunning();}
function startAlgo(template){
  $('mTitle').textContent='启动算法: '+template;
  $('mBody').innerHTML=`<div class="fgroup"><label class="flabel">合约代码</label><input class="finput" id="aSymbol" placeholder="如 cu2506.SHFE" list="contractDL"></div><div class="fgroup"><label class="flabel">方向</label><select class="finput" id="aDir"><option value="多">买入</option><option value="空">卖出</option></select></div><div class="fgroup"><label class="flabel">开平</label><select class="finput" id="aOffset"><option value="开">开仓</option><option value="平">平仓</option></select></div><div class="fgroup"><label class="flabel">价格 (0=市价)</label><input class="finput" id="aPrice" type="number" step="0.01" value="0"></div><div class="fgroup"><label class="flabel">手数</label><input class="finput" id="aVolume" type="number" value="1" min="1"></div>`;
  $('modal').classList.add('on');
  $('mYes').onclick=async()=>{
    $('modal').classList.remove('on');
    const vs=$('aSymbol').value.trim(),d=$('aDir').value,o=$('aOffset').value,p=parseFloat($('aPrice').value)||0,v=parseInt($('aVolume').value)||1;
    if(!vs){showToast('请输入合约代码','err');return;}
    const r=await apiPost('/api/ext/algo/start',{template_name:template,vt_symbol:vs,direction:d,offset:o,price:p,volume:v,setting:{}});
    showToast(r.message||'已启动','ok');loadAlgoRunning();
  };
}

// ===== Risk =====
const RISK_INFO={};
async function loadRiskRules(){
  let rules=await apiGet('/api/ext/risk-rules');
  if(!rules||rules.length===0){rules=await apiGet('/api/ext/risk-rule-names');}
  if(!rules||rules.length===0) return;
  rules.forEach(r=>{
    const name=typeof r==='string'?r:r.name;
    if(!(name in riskState)) riskState[name]={enabled:typeof r==='string'?false:(r.enabled||false)};
    else riskState[name]={enabled:typeof r==='string'?riskState[name]?.enabled||false:(r.enabled||false)};
  });
  const infos={
    '活动委托检查':{desc:'检查当前活跃委托单数量是否超限',unit:'笔',suggest:'建议 20-50',type:'num'},
    '每日上限检查':{desc:'限制每天最大下单/撤单总次数',unit:'次/天',suggest:'建议 100-500',type:'num'},
    '重复报单检查':{desc:'检测相同合约、方向、价格的重复委托',type:'bool'},
    '委托规模检查':{desc:'限制单笔委托的最大手数',unit:'手',suggest:'建议 1-50',type:'num'},
    '委托指令检查':{desc:'检查合约代码是否有效、是否在交易时段',type:'bool'},
  };
  $('riskList').innerHTML=rules.map(r=>{
    const name=typeof r==='string'?r:r.name;
    const info=infos[name]||{desc:'',type:'num'};
    const en=riskState[name]?.enabled||false;
    const isBool=info.type==='bool';
    return `<div class="rrule">
      <div class="rinfo"><h4>${name}</h4><p style="font-size:11px;color:#8899aa;margin-top:2px">${info.desc}</p><p style="font-size:10px;color:#667788">${isBool?'开关型规则，无需设置上限':info.unit+' | '+info.suggest}</p></div>
      <div class="rctrl">
        <span class="badge risk-badge ${en?'bg-ok':'bg-off'}">${en?'已启用':'已关闭'}</span>
        <label class="toggle"><input type="checkbox" ${en?'checked':''} data-risk="${name}"><span></span></label>
        ${isBool?'':`<button class="btn btn-b btn-s" onclick="editRisk('${name}')">设置上限</button>`}
      </div>
    </div>`;
  }).join('');
}
document.addEventListener('change',async e=>{
  if(e.target.dataset.risk){
    const name=e.target.dataset.risk,en=e.target.checked;
    await apiPost(en?'/api/ext/risk-rule/add':'/api/ext/risk-rule/update',{rule_name:name,setting:{active:en}});
    riskState[name]={enabled:en};
    const badge=e.target.closest('.rctrl')?.querySelector('.risk-badge');
    if(badge){badge.textContent=en?'已启用':'已关闭';badge.className='badge risk-badge '+(en?'bg-ok':'bg-off');}
  }
});
function editRisk(name){
  $('mTitle').textContent='配置: '+name;
  $('mBody').innerHTML=`<div class="fgroup"><label class="flabel">限制值</label><input class="finput" id="rValue" placeholder="输入数值"></div>`;
  $('modal').classList.add('on');
  $('mYes').onclick=async()=>{
    $('modal').classList.remove('on');
    const v=parseInt($('rValue').value)||0;
    await apiPost('/api/ext/risk-rule/update',{rule_name:name,setting:{limit:v}});
    showToast('已更新','ok');
  };
}

// ===== Chart =====
let plotlyReady=false;
function loadPlotly(cb){
  if(plotlyReady){cb();return;}
  if(window.Plotly){plotlyReady=true;cb();return;}
  const s=document.createElement('script');
  s.src='https://registry.npmmirror.com/plotly.js-dist/3.1.0/files/plotly.min.js';
  s.onload=()=>{plotlyReady=true;cb();};
  s.onerror=()=>{
    const s2=document.createElement('script');
    s2.src='https://cdn.jsdelivr.net/npm/plotly.js-dist@3.1.0/plotly.min.js';
    s2.onload=()=>{plotlyReady=true;cb();};
    s2.onerror=()=>showToast('图表加载失败','err');
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}
async function loadChartList(){
  const list=await apiGet('/api/ext/chart-list');
  const opts=Object.keys(list||{}).map(k=>`<option value="${k}">${k} (${list[k].name})</option>`).join('');
  $('chSymbol').innerHTML=opts;
  $('btSymbol').innerHTML=opts;
}
async function loadChart(){
  const sym=$('chSymbol').value||'CU';
  const data=await apiGet('/api/ext/chart-data/'+sym);
  if(data.error){showToast(data.error,'err');return;}
  loadPlotly(()=>{
    const trace={x:data.map(d=>d.date),open:data.map(d=>d.open),high:data.map(d=>d.high),low:data.map(d=>d.low),close:data.map(d=>d.close),type:'candlestick',name:sym,increasing:{line:{color:'#3a7d5c'}},decreasing:{line:{color:'#c0392b'}}};
    Plotly.newPlot('chContainer',[trace],{paper_bgcolor:'#1a2740',plot_bgcolor:'#0f1923',font:{color:'#8899aa'},xaxis:{gridcolor:'rgba(255,255,255,0.05)'},yaxis:{gridcolor:'rgba(255,255,255,0.05)'},margin:{t:10,r:10,b:40,l:50},height:480},{responsive:true,displayModeBar:false});
  });
}

// ===== Backtest =====
async function runBacktest(){
  const sym=$('btSymbol').value||'CU',fast=$('btFast').value||5,slow=$('btSlow').value||20,capital=$('btCapital').value||100000;
  const r=await apiPost('/api/ext/backtest',{symbol:sym,fast:parseInt(fast),slow:parseInt(slow),capital:parseFloat(capital)});
  if(r.error){showToast(r.error,'err');return;}
  $('btResult').innerHTML=`<div class="cards" style="grid-template-columns:repeat(2,1fr);gap:10px">
    <div class="card" style="padding:14px"><div class="clabel">最终权益</div><div class="cvalue" style="font-size:20px">$${r.final.toLocaleString()}</div></div>
    <div class="card" style="padding:14px"><div class="clabel">总收益率</div><div class="cvalue ${r.return_pct>=0?'up':'dn'}" style="font-size:20px">${r.return_pct}%</div></div>
    <div class="card" style="padding:14px"><div class="clabel">最大回撤</div><div class="cvalue dn" style="font-size:20px">${r.max_dd_pct}%</div></div>
    <div class="card" style="padding:14px"><div class="clabel">胜率</div><div class="cvalue" style="font-size:20px">${r.win_pct}%</div></div>
  </div>`;
  loadPlotly(()=>{
    const curve=r.curve||[];
    Plotly.newPlot('btChart',[{x:curve.map(d=>d.date),y:curve.map(d=>d.equity),type:'scatter',mode:'lines',line:{color:'#c9a96e',width:2},fill:'tozeroy',fillcolor:'rgba(201,169,110,0.1)'}],{paper_bgcolor:'#1a2740',plot_bgcolor:'#0f1923',font:{color:'#8899aa'},xaxis:{gridcolor:'rgba(255,255,255,0.05)'},yaxis:{gridcolor:'rgba(255,255,255,0.05)'},margin:{t:10,r:10,b:40,l:60},height:380,showlegend:false},{responsive:true,displayModeBar:false});
  });
}
